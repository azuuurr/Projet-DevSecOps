name: CI/CD Pipeline DevSecOps

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # -- 01. Lint & Quality --
  flake8:
    name: "01 - Flake8 Lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install flake8
      - run: flake8 app/ run.py --config .flake8

  # -- 02. SAST (Static Analysis) --
  semgrep:
    name: "02 - Semgrep SAST"
    runs-on: ubuntu-latest
    needs: flake8
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      - run: semgrep scan --config auto --error app/

  # -- 03. Dependency Scan --
  pip-audit:
    name: "03 - pip-audit Dependencies"
    runs-on: ubuntu-latest
    needs: flake8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: pip install pip-audit
      - run: pip-audit

  # -- 04. Docker Build --
  docker-build:
    name: "04 - Docker Build"
    runs-on: ubuntu-latest
    needs: [semgrep, pip-audit]
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t academic-platform:${{ github.sha }} .

  # -- 05. OWASP ZAP DAST --
  owasp-zap:
    name: "05 - OWASP ZAP DAST"
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - uses: actions/checkout@v4

      - name: Start application
        run: |
          docker compose up -d --build
          echo "Waiting for services to be ready..."
          sleep 30
          curl --retry 10 --retry-delay 5 --retry-connrefused http://localhost:5000/ || true

      - name: Run OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: "http://localhost:5000"
          rules_file_name: ""
          cmd_options: "-a"
          allow_issue_writing: false

      - name: Stop application
        if: always()
        run: docker compose down

  # -- 06. Deploy --
  deploy:
    name: "06 - Deploy"
    runs-on: ubuntu-latest
    needs: [docker-build, owasp-zap]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy via Docker Compose
        run: |
          docker compose down || true
          docker compose up -d --build
          echo "Deployment successful"
